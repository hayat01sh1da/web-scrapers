name: Setup Python Environment
description: Setup Python with caching and dependency installation

runs:
  using: composite
  steps:
    # To automatically get bug fixes and new Python versions for ruby/setup-ruby,
    # change this to (see https://github.com/actions/setup-python#versioning):
    - name: Set up Python
      uses: actions/setup-python@v6
    - name: Pip Install with Caching
      shell: bash
      working-directory: .
      run: |
        pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      env:
      # Cache pip dependencies
      # See https://github.com/actions/cache/blob/main/examples.md#pip
        PIP_CACHE_DIR: ${{ runner.temp }}/pip_cache
    - name: Set up Google Chrome
      uses: browser-actions/setup-chrome@v1
    - name: Set up Chromedriver
      uses: nanasess/setup-chromedriver@v2
    - name: Start Chromedriver
      shell: bash
      working-directory: .
      run: export DISPLAY=:99 && chromedriver --url-base=/wd/hub &
